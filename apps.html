<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uygulamalarımız / Our Apps</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  background: #0f0f14;
  padding: 40px 16px 60px;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: -120px; left: 50%;
  transform: translateX(-50%);
  width: 480px; height: 480px;
  background: radial-gradient(circle, rgba(139,120,255,0.18) 0%, rgba(99,179,237,0.10) 50%, transparent 70%);
  border-radius: 50%;
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -100px; right: -80px;
  width: 320px; height: 320px;
  background: radial-gradient(circle, rgba(236,109,149,0.12) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none; z-index: 0;
}
.container { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; }
.lang-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 32px; }
.lang-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px; padding: 6px 18px;
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.45); cursor: pointer; transition: all 0.2s;
}
.lang-btn.active {
  background: rgba(139,120,255,0.2);
  border-color: rgba(139,120,255,0.4);
  color: #c4b8ff;
}
.header { text-align: center; margin-bottom: 32px; }
.header h1 { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -0.5px; margin-bottom: 6px; }
.header p { font-size: 14px; color: rgba(255,255,255,0.4); }
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 18px; padding: 16px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 14px;
  text-decoration: none; color: inherit;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  transition: background 0.2s, transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.card:active { transform: scale(0.97); background: rgba(255,255,255,0.08); }
.icon { width: 56px; height: 56px; border-radius: 14px; object-fit: cover; flex-shrink: 0; }
.info { flex: 1; min-width: 0; }
.name { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 3px; }
.desc { font-size: 12px; color: rgba(255,255,255,0.45); line-height: 1.5; }
.arrow {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: rgba(255,255,255,0.5); font-size: 16px;
}
</style>
</head>

<script>
function setLang(lang, btn) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (lang === 'tr') {
    document.getElementById('title').textContent = 'Uygulamalarımız';
    document.getElementById('subtitle').textContent = "Dokun ve Google Play'e git";
  } else {
    document.getElementById('title').textContent = 'Our Apps';
    document.getElementById('subtitle').textContent = 'Tap to open on Google Play';
  }
  document.querySelectorAll('.desc[data-tr]').forEach(el => { el.textContent = el.dataset[lang]; });
}
</script>
